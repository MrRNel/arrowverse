# App only — MySQL/MariaDB stays on your own host (see .env.docker.example).
services:
  arrowverse:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_URL: ${APP_URL:-http://localhost:8000}
    ports:
      - "${HOST_PORT:-8000}:8000"
    env_file:
      - .env.docker
    environment:
      ENVIRONMENT: production
      PORT: "8000"
    restart: unless-stopped

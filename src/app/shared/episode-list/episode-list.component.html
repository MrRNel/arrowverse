<section class="episode-list">
  <div class="episode-list__header">
    <div>
      <h2>{{ title() }}</h2>
      <p>{{ episodes().length }} episodes</p>
    </div>
  </div>

  <div class="episode-list__items">
    @for (episode of episodes(); track episode.row_number; let index = $index) {
      <article
        class="episode-row"
        [class.episode-row--watched]="episodeStatus(episode.row_number) === 'watched'"
        [class.episode-row--partial]="episodeStatus(episode.row_number) === 'partial'"
        [class.episode-row--next]="isUpNext(episode, index)"
      >
        <div class="episode-row__order">#{{ episode.row_number }}</div>

        <div class="episode-row__show">
          <img
            [src]="iconFor(episode.series)"
            [alt]="episode.series"
            class="episode-row__show-image"
            loading="lazy"
          />
        </div>

        <div class="episode-row__content">
          <div class="episode-row__title">{{ episode.episode_name }}</div>
          <div class="episode-row__meta">
            <p-tag [value]="episode.series" />
            <span>{{ formatCode(episode.episode_id) }}</span>
            <span>{{ episode.air_date }}</span>
          </div>
        </div>

        <div class="episode-row__actions">
          @if (isUpNext(episode, index)) {
            <span class="episode-row__badge">Up Next</span>
          }
          <p-selectbutton
            [options]="statusOptions"
            [ngModel]="episodeStatus(episode.row_number)"
            (ngModelChange)="onStatusChange(episode.row_number, $event)"
            optionLabel="label"
            optionValue="value"
            styleClass="episode-status-select"
            size="small"
          />
        </div>
      </article>
    }
  </div>
</section>
